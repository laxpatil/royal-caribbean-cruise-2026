<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{VEHICLE_EMOJI}} {{TRIP_NAME}} — Trip Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --bg-start: {{BG_START}};
      --bg-mid: {{BG_MID}};
      --bg-end: {{BG_END}};
      --card-bg: rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.12);
      --text-primary: #f0f4f8;
      --text-secondary: rgba(255,255,255,0.7);
      --accent-primary: {{ACCENT_PRIMARY}};
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.1);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ===== Animated Background ===== */
    .ocean-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .wave {
      position: absolute; bottom: -5%; left: -10%; width: 120%;
      height: 200px; border-radius: 50% 50% 0 0;
      opacity: 0.03;
      animation: waveFloat 8s ease-in-out infinite;
    }
    .wave:nth-child(1) { background: #4fc3f7; animation-delay: 0s; }
    .wave:nth-child(2) { background: #29b6f6; bottom: -8%; animation-delay: -2s; animation-duration: 10s; }
    .wave:nth-child(3) { background: #03a9f4; bottom: -12%; animation-delay: -4s; animation-duration: 12s; }
    @keyframes waveFloat {
      0%, 100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(30px) translateY(-15px); }
    }

    /* ===== Particles ===== */
    .particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .particle {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.5); }
    }

    /* ===== Layout Container ===== */
    .container {
      position: relative; z-index: 1;
      max-width: 720px; margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      padding: 40px 20px 32px;
      animation: fadeInDown 0.8s ease;
    }
    .trip-icon {
      font-size: 3.5rem;
      display: block;
      animation: iconBob 3s ease-in-out infinite;
      margin-bottom: 8px;
    }
    @keyframes iconBob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
    .header h1 {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #b3e5fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      font-size: 0.95rem; color: var(--text-secondary);
      margin-top: 6px;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Countdown ===== */
    .countdown-bar {
      display: flex; justify-content: center; gap: 16px;
      margin: 20px 0 28px;
      animation: fadeInUp 0.8s ease 0.2s both;
    }
    .cd-unit {
      text-align: center;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 14px; padding: 12px 16px; min-width: 68px;
      backdrop-filter: blur(12px);
      transition: transform 0.3s;
    }
    .cd-unit:hover { transform: translateY(-3px); }
    .cd-num {
      font-size: 1.6rem; font-weight: 900;
      background: linear-gradient(135deg, #ffd54f, #ffab40);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .cd-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); margin-top: 2px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Tab Navigation ===== */
    .tabs {
      display: flex; justify-content: center; gap: 10px;
      margin-bottom: 28px; flex-wrap: wrap;
      animation: fadeInUp 0.8s ease 0.3s both;
    }
    .tab-btn {
      padding: 14px 32px; border-radius: 50px;
      border: 2px solid var(--glass-border);
      background: var(--glass); color: white;
      font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(12px); position: relative; overflow: hidden;
    }
    .tab-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    .tab-btn:hover::before { left: 100%; }
    .tab-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent-primary), rgba(255,215,0,0.8));
      border-color: var(--accent-primary); color: #000;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    }

    /* ===== Day Panel ===== */
    .day-panel {
      display: none;
      animation: panelSlideIn 0.5s ease;
    }
    .day-panel.active { display: block; }
    @keyframes panelSlideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ===== Port Banner ===== */
    .port-banner {
      border-radius: 20px; padding: 24px 28px; margin-bottom: 24px;
      color: white; display: flex; align-items: center; gap: 18px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--accent-primary), rgba(255,215,0,0.8));
    }
    .port-banner::after {
      content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px;
      border-radius: 50%; background: rgba(255,255,255,0.08);
    }
    .port-banner .port-icon { font-size: 3rem; z-index: 1; }
    .port-banner .port-info { z-index: 1; }
    .port-banner h2 { font-size: 1.5rem; font-weight: 900; }
    .port-banner .port-sub { font-size: 0.85rem; opacity: 0.9; margin-top: 3px; }
    .weather-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.2); border-radius: 20px;
      padding: 5px 14px; font-size: 0.78rem; font-weight: 700;
      margin-top: 8px; backdrop-filter: blur(4px);
    }

    /* ===== Budget Tracker ===== */
    .budget-bar {
      display: flex; align-items: center; gap: 12px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 14px 20px; margin-bottom: 24px;
      backdrop-filter: blur(12px);
    }
    .budget-bar .budget-icon { font-size: 1.5rem; }
    .budget-bar .budget-info { flex: 1; }
    .budget-bar .budget-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
    .budget-bar .budget-amount { font-size: 1.2rem; font-weight: 900; color: #ffd54f; }
    .budget-bar .budget-detail { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
    .budget-progress { width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .budget-fill {
      height: 100%; border-radius: 3px; transition: width 1.5s ease;
      background: linear-gradient(90deg, var(--accent-primary), rgba(255,215,0,0.8));
    }

    /* ===== Timeline ===== */
    .timeline { position: relative; padding-left: 0; }
    .timeline::before {
      content: ''; position: absolute; left: 30px; top: 20px; bottom: 20px;
      width: 3px; border-radius: 2px;
      background: linear-gradient(180deg, var(--accent-primary), rgba(255,215,0,0.15));
    }

    .time-block {
      display: flex; gap: 16px; margin-bottom: 16px;
      position: relative; opacity: 0; transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .time-block.visible {
      opacity: 1; transform: translateY(0);
    }

    .time-dot-wrap {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; width: 28px; margin-left: 17px; padding-top: 20px;
    }
    .time-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 3px solid var(--accent-primary); flex-shrink: 0;
      box-shadow: 0 0 12px rgba(255,255,255,0.15);
      z-index: 1; background: var(--bg-mid);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .time-block:hover .time-dot {
      transform: scale(1.3);
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    .time-card {
      flex: 1;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 18px; padding: 18px 20px;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      cursor: default;
    }
    .time-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: translateX(4px);
    }

    .time-label {
      font-size: 0.7rem; font-weight: 800; letter-spacing: 1.2px;
      text-transform: uppercase; margin-bottom: 5px;
      color: var(--accent-primary);
    }
    .time-card h3 { font-size: 1.05rem; font-weight: 800; color: white; margin-bottom: 7px; }
    .time-card p { font-size: 0.84rem; color: var(--text-secondary); line-height: 1.6; }
    .time-card strong { color: var(--text-primary); }

    /* ===== Tags ===== */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tag {
      padding: 4px 11px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700;
      border: 1px solid transparent;
      transition: transform 0.2s, box-shadow 0.2s;
      background: rgba(255,215,0,0.15);
      color: #ffd700;
      border-color: rgba(255,215,0,0.25);
    }
    .tag:hover { transform: scale(1.05); }

    /* ===== Option Comparison Cards ===== */
    .options-section { margin: 16px 0; }
    .options-section > h3 {
      font-size: 0.95rem; font-weight: 800; color: var(--text-primary);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .option-cards { display: flex; flex-direction: column; gap: 10px; }
    .option-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 16px 18px; position: relative;
      backdrop-filter: blur(12px); transition: all 0.3s; overflow: hidden;
    }
    .option-card:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .option-card.recommended {
      border-color: rgba(255,215,0,0.35);
      background: rgba(255,215,0,0.05);
    }
    .option-badge {
      position: absolute; top: 12px; right: 12px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .badge-free { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .badge-premium { background: rgba(233,30,99,0.2); color: #f48fb1; }
    .badge-splurge { background: rgba(255,215,0,0.2); color: #ffd700; }
    .badge-pick { background: rgba(255,215,0,0.25); color: #ffd700; }
    .option-card h4 { font-size: 0.95rem; font-weight: 800; color: white; margin-bottom: 4px; }
    .option-card .option-price { font-size: 0.82rem; color: #ffd54f; font-weight: 700; margin-bottom: 6px; }
    .option-card p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; }
    .option-card .option-pros {
      list-style: none; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;
    }
    .option-card .option-pros li {
      font-size: 0.72rem; padding: 3px 10px; border-radius: 12px;
      background: rgba(255,255,255,0.06); color: var(--text-secondary);
    }

    /* ===== Hero Images ===== */
    .hero-image {
      width: 100%; height: 200px; border-radius: 20px;
      overflow: hidden; margin-bottom: 16px;
      position: relative;
      box-shadow: var(--shadow);
    }
    .hero-image img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s ease;
    }
    .hero-image:hover img { transform: scale(1.05); }
    .hero-image .hero-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 30px 16px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      font-size: 0.75rem; color: rgba(255,255,255,0.8);
      font-weight: 600;
    }
    @media (max-width: 520px) {
      .hero-image { height: 160px; }
    }

    /* ===== Collapsible Sections ===== */
    .collapsible {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 18px; margin-top: 16px; overflow: hidden;
      backdrop-filter: blur(12px); transition: all 0.3s;
    }
    .collapsible:hover { border-color: rgba(255,255,255,0.2); }
    .collapsible-header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px; cursor: pointer;
      user-select: none; transition: background 0.2s;
    }
    .collapsible-header:hover { background: rgba(255,255,255,0.04); }
    .collapsible-header h3 {
      font-size: 1rem; font-weight: 800; flex: 1;
    }
    .collapsible-header .chevron {
      font-size: 0.8rem; transition: transform 0.3s;
      color: var(--text-secondary);
    }
    .collapsible.open .chevron { transform: rotate(180deg); }
    .collapsible-body {
      max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s;
    }
    .collapsible.open .collapsible-body {
      max-height: 1200px; padding: 0 20px 18px;
    }

    /* ===== Tips ===== */
    .tips-list { list-style: none; }
    .tips-list li {
      font-size: 0.84rem; color: var(--text-secondary);
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; gap: 10px; line-height: 1.55;
    }
    .tips-list li:last-child { border-bottom: none; }
    .tips-list li .bullet { flex-shrink: 0; }
    .tips-list li strong { color: var(--text-primary); }

    /* ===== Interactive Pack Checklist ===== */
    .pack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pack-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.82rem; color: var(--text-secondary);
      padding: 8px 12px; background: rgba(255,255,255,0.04);
      border-radius: 10px; cursor: pointer; transition: all 0.25s;
      user-select: none; border: 1px solid transparent;
    }
    .pack-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
    .pack-item.checked {
      background: rgba(46,204,113,0.1); border-color: rgba(46,204,113,0.25);
      text-decoration: line-through; color: rgba(255,255,255,0.4);
    }
    .pack-check {
      width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.25s; font-size: 0.65rem;
    }
    .pack-item.checked .pack-check {
      background: #2ecc71; border-color: #2ecc71; color: white;
    }
    .pack-progress {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; font-size: 0.78rem; color: var(--text-secondary);
    }
    .pack-progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .pack-progress-fill { height: 100%; background: #2ecc71; border-radius: 3px; transition: width 0.4s ease; width: 0%; }

    /* ===== Footer ===== */
    .footer {
      text-align: center; color: var(--text-secondary);
      margin-top: 40px; padding: 20px; font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer a { color: #60a5fa; text-decoration: none; }

    /* ===== Mobile Tweaks ===== */
    @media (max-width: 520px) {
      .header h1 { font-size: 1.5rem; }
      .tab-btn { padding: 11px 22px; font-size: 0.88rem; }
      .port-banner { flex-direction: column; text-align: center; padding: 20px; }
      .pack-grid { grid-template-columns: 1fr; }
      .cd-unit { min-width: 56px; padding: 10px 12px; }
      .cd-num { font-size: 1.3rem; }
      .budget-bar { flex-direction: column; text-align: center; }
      .tabs { gap: 8px; }
    }

    /* ===== Scroll Progress Bar ===== */
    .scroll-progress {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
      border-radius: 0 2px 2px 0; transition: width 0.1s;
      background: linear-gradient(90deg, var(--accent-primary), rgba(255,215,0,0.8));
    }

    /* ===== Back to Top ===== */
    .back-to-top {
      position: fixed; bottom: 24px; right: 24px; z-index: 99;
      width: 44px; height: 44px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: white;
      opacity: 0; transform: translateY(20px);
      transition: all 0.3s; backdrop-filter: blur(12px);
      background: linear-gradient(135deg, var(--accent-primary), rgba(255,215,0,0.8));
      box-shadow: 0 4px 16px rgba(255,215,0,0.4);
    }
    .back-to-top.visible { opacity: 1; transform: translateY(0); }
    .back-to-top:hover { transform: translateY(-3px) scale(1.1); }

    /* ===== Route Map ===== */
    .route-map-section {
      margin: 24px 0;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .route-map-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px 14px;
      background: rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .map-icon { font-size: 2rem; }
    .route-map-header h2 { font-size: 1.2rem; font-weight: 900; color: #f0f4f8; margin: 0; }
    .map-sub { font-size: 0.8rem; color: rgba(255,255,255,0.7); margin: 2px 0 0; }
    #route-map-canvas { width: 100%; height: 420px; display: block; background: #06131f; cursor: grab; }
    #route-map-canvas:active { cursor: grabbing; }
    .map-legend {
      display: flex; flex-wrap: wrap; gap: 10px 20px;
      padding: 14px 20px;
      background: rgba(0,0,0,0.25);
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
    }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .map-tooltip {
      position: fixed; pointer-events: none;
      background: #0f2847; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; padding: 10px 14px;
      font-family: 'Nunito', sans-serif; font-size: 0.8rem; color: #f0f4f8;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      max-width: 200px; z-index: 9999;
      opacity: 0; transition: opacity 0.2s;
    }
    .map-tooltip.visible { opacity: 1; }
    .map-tooltip h4 { margin: 0 0 4px; font-size: 0.9rem; font-weight: 800; }
    .map-tooltip p { margin: 2px 0; font-size: 0.73rem; opacity: 0.8; }
    .map-tooltip .tt-badge {
      display: inline-block; margin-top: 6px; padding: 2px 8px;
      border-radius: 20px; font-size: 0.65rem; font-weight: 700;
    }

  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="ocean-bg">
    <div class="wave"></div><div class="wave"></div><div class="wave"></div>
  </div>
  <div class="particles" id="particles"></div>

  <!-- Scroll Progress -->
  <div class="scroll-progress" id="scrollProgress" style="width: 0%"></div>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0})">↑</button>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <span class="trip-icon">{{VEHICLE_EMOJI}}</span>
      <h1>{{TRIP_NAME}}</h1>
      <p class="subtitle">{{TRIP_SUBTITLE}}</p>
    </div>

    <!-- Countdown -->
    <div class="countdown-bar" id="countdown">
      <div class="cd-unit"><div class="cd-num" id="cd-days">--</div><div class="cd-label">Days</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-hours">--</div><div class="cd-label">Hours</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-mins">--</div><div class="cd-label">Mins</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-secs">--</div><div class="cd-label">Secs</div></div>
    </div>

    <!-- ==================== ROUTE MAP ==================== -->
    <div class="route-map-section">
      <div class="route-map-header">
        <span class="map-icon">🗺️</span>
        <div>
          <h2>Journey Map</h2>
          <p class="map-sub">Your route {{COUNTDOWN_LABEL}}</p>
        </div>
      </div>
      <canvas id="route-map-canvas"></canvas>
      <div class="map-legend" id="map-legend"></div>
    </div>
    <div class="map-tooltip" id="map-tooltip"></div>

    <!-- Tabs -->
    <div class="tabs" id="tabs"></div>

    <!-- Tab Panels -->
    <div id="panels">
      {{TAB_PANELS}}
    </div>

    <div class="footer">
      {{VEHICLE_EMOJI}} {{TRIP_NAME}} · Built with ❤️ for your adventure
    </div>

  </div>

  <script>
    // ===== Tab Switching =====
    let currentTab = null;
    function showTab(tabId) {
      currentTab = tabId;
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      const panel = document.getElementById(tabId);
      if (panel) {
        panel.classList.add('active');
      }
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector(`[data-tab="${tabId}"]`);
      if (btn) {
        btn.classList.add('active');
      }
      observeTimeBlocks();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialize first tab
    document.addEventListener('DOMContentLoaded', function() {
      const firstTab = document.querySelector('.tab-btn');
      if (firstTab) {
        showTab(firstTab.getAttribute('data-tab'));
      }
    });

    // ===== Countdown to Departure =====
    function updateCountdown() {
      const departure = new Date('{{DEPARTURE_DATE}}T00:00:00');
      const now = new Date();
      const diff = departure - now;
      if (diff <= 0) {
        document.getElementById('cd-days').textContent = '🎉';
        document.getElementById('cd-hours').textContent = 'TIME';
        document.getElementById('cd-mins').textContent = 'TO';
        document.getElementById('cd-secs').textContent = 'GO';
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-days').textContent = d;
      document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
      document.getElementById('cd-mins').textContent = String(m).padStart(2, '0');
      document.getElementById('cd-secs').textContent = String(s).padStart(2, '0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ===== Scroll Progress & Back to Top =====
    window.addEventListener('scroll', () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const pct = h > 0 ? (window.scrollY / h) * 100 : 0;
      document.getElementById('scrollProgress').style.width = pct + '%';
      document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 400);
    });

    // ===== Intersection Observer for Timeline =====
    function observeTimeBlocks() {
      const blocks = document.querySelectorAll('.day-panel.active .time-block');
      const obs = new IntersectionObserver((entries) => {
        entries.forEach((e, i) => {
          if (e.isIntersecting) {
            setTimeout(() => e.target.classList.add('visible'), i * 80);
          }
        });
      }, { threshold: 0.15 });
      blocks.forEach(b => { b.classList.remove('visible'); obs.observe(b); });
    }

    // ===== Collapsible =====
    function toggleCollapse(header) {
      header.parentElement.classList.toggle('open');
    }

    // ===== Interactive Packing Checklist =====
    function togglePack(el) {
      el.classList.toggle('checked');
      const check = el.querySelector('.pack-check');
      check.textContent = el.classList.contains('checked') ? '✓' : '';
      const gridId = el.closest('.pack-grid')?.id;
      if (gridId) {
        updatePackProgress(gridId);
      }
    }
    function updatePackProgress(gridId) {
      const grid = document.getElementById(gridId);
      if (!grid) return;
      const total = grid.querySelectorAll('.pack-item').length;
      const checked = grid.querySelectorAll('.pack-item.checked').length;
      const pct = total > 0 ? (checked / total) * 100 : 0;
      const progressFill = grid.closest('.collapsible-body').querySelector('.pack-progress-fill');
      const progressText = grid.closest('.collapsible-body').querySelector('[class*="pack-text"]');
      if (progressFill) {
        progressFill.style.width = pct + '%';
      }
      if (progressText) {
        const emoji = checked === total && total > 0 ? ' ✅' : '';
        progressText.textContent = checked + ' / ' + total + ' packed' + emoji;
      }
    }

    // ===== Particles =====
    (function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 2.5 + 1;
        p.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${Math.random()*3+2}s;`;
        container.appendChild(p);
      }
    })();
  </script>

  <script>
  (function() {
    var canvas = document.getElementById('route-map-canvas');
    var tooltip = document.getElementById('map-tooltip');
    if (!canvas) return;

    var ctx = canvas.getContext('2d');

    {{MAP_PORTS_JS}}

    var MAP = {{MAP_BOUNDS_JS}};

    {{MAP_LANDMASSES_JS}}

    var W, H, shipFrac = 0, shipSeg = 0, hoveredPort = null;
    var routeLoop = ports.map(function(p){ return p; }).concat([ports[0]]);

    function resize() {
      var rect = canvas.parentElement.getBoundingClientRect();
      W = canvas.width  = rect.width  || 680;
      H = canvas.height = 420;
    }

    function project(lat, lng) {
      var x = (lng - MAP.minLng) / (MAP.maxLng - MAP.minLng) * W;
      var y = (1 - (lat - MAP.minLat) / (MAP.maxLat - MAP.minLat)) * H;
      return { x: x, y: y };
    }

    var dashOffset = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);

      var grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0,   '#061626');
      grad.addColorStop(0.5, '#0a2340');
      grad.addColorStop(1,   '#0d2e50');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (var gx = 0; gx < W; gx += 60) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
      }
      for (var gy = 0; gy < H; gy += 60) {
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
      }

      landmasses.forEach(function(lm) {
        if (!lm.pts.length) return;
        ctx.beginPath();
        var p0 = project(lm.pts[0][0], lm.pts[0][1]);
        ctx.moveTo(p0.x, p0.y);
        for (var i = 1; i < lm.pts.length; i++) {
          var p = project(lm.pts[i][0], lm.pts[i][1]);
          ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.fillStyle = lm.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      });

      var routePts = routeLoop.map(function(p){ return project(p.lat, p.lng); });
      ctx.beginPath();
      ctx.moveTo(routePts[0].x, routePts[0].y);
      for (var i = 1; i < routePts.length; i++) ctx.lineTo(routePts[i].x, routePts[i].y);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 10;
      ctx.lineJoin = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(routePts[0].x, routePts[0].y);
      for (var j = 1; j < routePts.length; j++) ctx.lineTo(routePts[j].x, routePts[j].y);
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 2;
      ctx.setLineDash([12, 8]);
      ctx.lineDashOffset = dashOffset;
      ctx.stroke();
      ctx.setLineDash([]);
      dashOffset -= 0.6;

      ports.forEach(function(port, idx) {
        var pt = project(port.lat, port.lng);
        var r = hoveredPort === idx ? 11 : 9;

        var glow = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r * 2.5);
        glow.addColorStop(0, port.color + 'aa');
        glow.addColorStop(1, port.color + '00');
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
        ctx.fillStyle = port.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.font = 'bold 11px Nunito, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        var label = port.emoji + ' ' + port.name;
        var tw = ctx.measureText(label).width;
        var lx = pt.x + r + 8, ly = pt.y;
        if (lx + tw + 8 > W) { lx = pt.x - r - 8 - tw; }

        ctx.fillStyle = 'rgba(6,18,31,0.88)';
        ctx.fillRect(lx - 4, ly - 9, tw + 8, 18);
        ctx.strokeStyle = port.color + '66';
        ctx.lineWidth = 1;
        ctx.strokeRect(lx - 4, ly - 9, tw + 8, 18);
        ctx.fillStyle = port.color;
        ctx.fillText(label, lx, ly);
      });

      var a = routeLoop[shipSeg], b = routeLoop[shipSeg + 1] || routeLoop[0];
      var sp = project(a.lat + (b.lat - a.lat) * shipFrac, a.lng + (b.lng - a.lng) * shipFrac);
      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('{{VEHICLE_EMOJI}}', sp.x, sp.y);

      shipFrac += 0.003;
      if (shipFrac >= 1) { shipFrac = 0; shipSeg = (shipSeg + 1) % (routeLoop.length - 1); }

      requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      var mx = e.clientX - rect.left, my = e.clientY - rect.top;
      var found = null;
      ports.forEach(function(port, idx) {
        var pt = project(port.lat, port.lng);
        var dx = mx - pt.x, dy = my - pt.y;
        if (Math.sqrt(dx*dx + dy*dy) < 16) found = idx;
      });
      hoveredPort = found;
      if (found !== null) {
        var port = ports[found];
        tooltip.innerHTML = '<h4>' + port.emoji + ' ' + port.name + '</h4>' +
          '<p style="color:' + port.color + ';font-weight:700;margin-bottom:5px">📍 ' + port.location + '</p>' +
          (port.facts ? port.facts.map(function(f){ return '<p>' + f + '</p>'; }).join('') : '') +
          '<span class="tt-badge" style="background:' + port.color + '33;color:' + port.color + '">' + port.badge + '</span>';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 10) + 'px';
        tooltip.classList.add('visible');
        canvas.style.cursor = 'pointer';
      } else {
        tooltip.classList.remove('visible');
        canvas.style.cursor = 'grab';
      }
    });
    canvas.addEventListener('mouseleave', function() {
      tooltip.classList.remove('visible');
      hoveredPort = null;
    });

    resize();
    window.addEventListener('resize', function() { resize(); });
    draw();
  })();
  </script>

</body>
</html>
